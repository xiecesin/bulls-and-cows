# 服务端口
server.port=8080

# 应用名称
spring.application.name=bulls-and-cows

# ==================== 数据库配置 ====================
# H2 数据库配置（开发环境）
spring.datasource.url=jdbc:h2:mem:bullscows;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 控制台（开发环境开启）
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA 配置
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==================== JWT 配置 ====================
# JWT 密钥（生产环境请使用更复杂的密钥）
jwt.secret=bulls-and-cows-secret-key-for-jwt-token-generation-2026
# Token 有效期（毫秒），默认7天
jwt.expiration=604800000
# Refresh Token 有效期（毫秒），默认30天
jwt.refresh-expiration=2592000000

# ==================== 安全配置 ====================
# 跨域配置
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ==================== 日志配置 ====================
logging.level.com.bullscows=DEBUG
logging.level.org.springframework.security=DEBUG

